# Сборка release APK и загрузка как артефакт (скачать с телефона/ПК со страницы запуска Actions).
# Секреты: Settings → Secrets and variables → Actions → New repository secret
#   SUPABASE_URL      — https://xxxx.supabase.co
#   SUPABASE_ANON_KEY — anon public key из Project Settings → API

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Dependencies
        run: flutter pub get

      - name: Build APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Задайте секреты SUPABASE_URL и SUPABASE_ANON_KEY в настройках репозитория."
            exit 1
          fi
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: customer-delivery-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
