# APK с вшитыми ключами: задайте Secrets → Actions:
#   SUPABASE_URL, SUPABASE_ANON_KEY (Project Settings → API в Supabase)
# Опционально: CREATE_ORDER_API_URL = полный URL Next.js /api/create-order на Vercel
# (как у сайта), если Edge Function create_order в Supabase не задеплоена.

name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.22.0"
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Generate launcher icons
        run: dart run flutter_launcher_icons

      - name: Build APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          CREATE_ORDER_API_URL: ${{ secrets.CREATE_ORDER_API_URL }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::Добавьте в репозиторий секреты SUPABASE_URL и SUPABASE_ANON_KEY (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          defines=(--dart-define=SUPABASE_URL="$SUPABASE_URL" --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY")
          if [ -n "$CREATE_ORDER_API_URL" ]; then
            defines+=(--dart-define=CREATE_ORDER_API_URL="$CREATE_ORDER_API_URL")
          fi
          flutter build apk --release "${defines[@]}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
