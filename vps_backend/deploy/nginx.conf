limit_req_zone $binary_remote_addr zone=api_global:10m rate=20r/s;
limit_req_zone $binary_remote_addr zone=orders_ip:10m rate=3r/s;
limit_conn_zone $binary_remote_addr zone=conn_limit_per_ip:10m;

upstream node_api {
    server 127.0.0.1:8080;
    keepalive 64;
}

server {
    listen 80;
    server_name api.myapp.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.myapp.uz;

    ssl_certificate /etc/letsencrypt/live/api.myapp.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.myapp.uz/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    client_max_body_size 512k;
    keepalive_timeout 65;
    send_timeout 30;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
      application/json
      application/javascript
      text/css
      text/plain
      text/xml
      application/xml;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    limit_conn conn_limit_per_ip 30;
    limit_req zone=api_global burst=60 nodelay;

    location /orders {
        limit_req zone=orders_ip burst=15 nodelay;
        proxy_pass http://node_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
    }

    location / {
        if ($request_method = GET) {
            add_header Cache-Control "public, max-age=30, stale-while-revalidate=60";
        }
        proxy_pass http://node_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-Id $request_id;
        proxy_set_header Connection "";
    }
}
